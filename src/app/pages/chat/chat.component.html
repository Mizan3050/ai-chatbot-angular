<section class="content-card">
  <div class="chat-header">
    <button class="clickable" (click)="messages.set([])">Clear Chat</button>
  </div>

  @if (!messages().length) {
    <div class="empty-chat">
      <div class="bot-avatar">✨</div>
      <h1>Start a chat</h1>
      <p>Ask questions about your uploaded documents and get AI-powered answers instantly.</p>
    </div>
  } @else {
    <div class="messages">
      @for (msg of messages(); track $index) {
        <div class="message" [class.user]="msg.type === 'user'">
          <div class="bubble">
            {{ msg.text }}
          </div>
        </div>
      }
    </div>
  }

  <div class="chat-input">
    <input
      type="text"
      placeholder="Ask a question about your documents..."
      [(ngModel)]="userInput"
      (keydown)="onEnter($event)"
    />
    <button (click)="sendMessage()" [disabled]="isLoading()">
      @if (isLoading()) {
        ...
      } @else {
        ➤
      }
    </button>
  </div>
</section>
